[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

[isort]
profile = black
line_length = 88
skip_gitignore = true

[black]
line-length = 88
target-version = ['py39', 'py310', 'py311']

[mypy]
python_version = 3.9
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True
